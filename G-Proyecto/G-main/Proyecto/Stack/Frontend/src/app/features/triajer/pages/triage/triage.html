<div class="card">
  <div class="table-header">
    <h2>Registrar Triaje</h2>
  </div>

  <div class="solicitud-info">
    <div class="info-grid">
      <div class="info-item">
        <span class="info-label">RUT Paciente</span>
        <span class="info-value">{{ pacienteRut || 'Cargando...' }}</span>
      </div>
      <div class="info-item">
        <span class="info-label">RUT Médico</span>
        <span class="info-value">{{ solicitud?.medicoRut || 'Cargando...' }}</span>
      </div>
      <div class="info-item">
        <span class="info-label">Especialidad</span>
        <span class="info-value">{{ solicitud?.especialidadNombre || 'Cargando...' }}</span>
      </div>
      <div class="info-item">
        <span class="info-label">Fecha Solicitud</span>
        <span class="info-value">{{ solicitud?.fechaSolicitud | date:'dd/MM/yyyy' }}</span>
      </div>
    </div>
  </div>

  <form class="registro-form" #triajeForm="ngForm" (ngSubmit)="triajeForm.form.valid && guardarTriaje()">
    <div class="form-grid">
      <div class="form-group">
        <label>Nivel de Urgencia</label>
        <select name="triNivel" [(ngModel)]="nuevoTriaje.nivelUrgencia" required>
          <option value="1">1 — Resucitación</option>
          <option value="2">2 — Emergencia</option>
          <option value="3">3 — Urgencia</option>
          <option value="4">4 — Urgencia Menor</option>
          <option value="5">5 — No Urgente</option>
        </select>
      </div>

      <div class="form-group">
        <label>Presión Arterial</label>
        <input type="text" name="triPA" [(ngModel)]="nuevoTriaje.presionArterial" placeholder="Ej: 120/80">
      </div>

      <div class="form-group">
        <label>Frecuencia Cardíaca</label>
        <input type="number" name="triFC" [(ngModel)]="nuevoTriaje.frecuenciaCardiaca" placeholder="Ej: 72">
      </div>

      <div class="form-group">
        <label>Temperatura (°C)</label>
        <input type="number" name="triTemp" [(ngModel)]="nuevoTriaje.temperatura" placeholder="Ej: 36.5" step="0.1">
      </div>

      <div class="form-group full-width">
        <label>Observaciones</label>
        <textarea name="triObs" [(ngModel)]="nuevoTriaje.observaciones" placeholder="Observaciones adicionales..." rows="2" class="edit-input"></textarea>
      </div>
    </div>

    <div class="form-actions">
      <button type="button" class="btn-cancel" (click)="volver()">Volver</button>
      <button type="submit" class="btn-save" [disabled]="!triajeForm.valid">Guardar Triaje</button>
    </div>
  </form>
</div>
