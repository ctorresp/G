<div class="login-container">
  <div class="login-bg"></div>
  <div class="login-card">
    <div class="card-top">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" width="22" height="22" stroke="white"
          stroke-width="3" fill="none" stroke-linecap="round"
          stroke-linejoin="round"><line x1="12" y1="5" x2="12"
            y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
      </div>
      <div class="header-text">
        <h2>Portal {{ portalSeleccionado }}</h2>
        <p>RedNorte · Gestión Clínica</p>
      </div>
    </div>

    <div class="error-alert" [style.display]="mensajeError ? 'flex' : 'none'">
      <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor"
        stroke-width="2" fill="none"><circle cx="12" cy="12"
          r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line
          x1="12" y1="16" x2="12.01" y2="16"></line></svg>
      {{ mensajeError }}
    </div>

    <form class="login-form">
      <div class="input-group">
        <input type="text" id="email" name="email" [(ngModel)]="emailOrRut"
          placeholder=" " autocomplete="username">
        <label for="email">Correo electrónico o RUT</label>
      </div>

      <div class="input-group">
        <input type="password" id="password" name="password"
          [(ngModel)]="password" placeholder=" "
          autocomplete="current-password">
        <label for="password">Contraseña</label>
      </div>

      <button type="button" class="btn-submit" (click)="iniciarSesion()">
        <span>Ingresar al sistema</span>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="2.5" stroke-linecap="round"
          stroke-linejoin="round"><line x1="5" y1="12" x2="19"
            y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
      </button>
    </form>
  </div>
</div>
