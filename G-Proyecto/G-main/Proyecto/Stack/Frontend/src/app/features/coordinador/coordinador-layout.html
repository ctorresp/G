<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" width="24" height="24" stroke="white"
          stroke-width="3" fill="none" stroke-linecap="round"
          stroke-linejoin="round">
          <line x1="12" y1="5" x2="12" y2="19"></line>
          <line x1="5" y1="12" x2="19" y2="12"></line>
        </svg>
      </div>
      <h2>RedNorte</h2>
    </div>

    <nav class="sidebar-nav">
      <a class="nav-item" routerLink="/coordinador/metricas"
        routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">
        <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor"
          stroke-width="2" fill="none" stroke-linecap="round"
          stroke-linejoin="round">
          <path d="M18 20V10M12 20V4M6 20v-6"></path>
        </svg>
        Métricas
      </a>

      <a class="nav-item" routerLink="/coordinador/pendientes"
        routerLinkActive="active">
        <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor"
          stroke-width="2" fill="none" stroke-linecap="round"
          stroke-linejoin="round">
          <polyline points="9 11 12 14 22 4"></polyline>
          <path
            d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path>
        </svg>
        Solicitudes Pendientes
      </a>


      <a class="nav-item" routerLink="/coordinador/reportes"
        routerLinkActive="active">
        <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor"
          stroke-width="2" fill="none" stroke-linecap="round"
          stroke-linejoin="round">
          <path
            d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
          <polyline points="14 2 14 8 20 8"></polyline>
          <line x1="16" y1="13" x2="8" y2="13"></line>
          <line x1="16" y1="17" x2="8" y2="17"></line>
        </svg>
        Reportes
      </a>
    </nav>

    <div class="sidebar-footer">
      <button class="btn-logout" (click)="cerrarSesion()">
        <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor"
          stroke-width="2" fill="none" stroke-linecap="round"
          stroke-linejoin="round">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
          <polyline points="16 17 21 12 16 7"></polyline>
          <line x1="21" y1="12" x2="9" y2="12"></line>
        </svg>
        Cerrar Sesión
      </button>
    </div>
  </aside>

  <main class="main-content">
    <header class="topbar">
      <div class="topbar-left">
        <span class="current-view">Coordinador</span>
      </div>
      <div class="user-profile">
        <div class="avatar coordinador">C</div>
        <div class="user-details">
          <span class="role">Coordinador</span>
        </div>
      </div>
    </header>

    <div class="content-area">
      <router-outlet />
    </div>
  </main>
</div>
