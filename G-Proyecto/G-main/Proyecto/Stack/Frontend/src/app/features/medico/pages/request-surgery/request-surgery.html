<div class="card">
  <div class="table-header">
    <h2>Solicitar Nueva Cirugía</h2>
  </div>
  <p class="descripcion">
    Completa el formulario para solicitar una cirugía. El coordinador recibirá
    tu solicitud y asignará pabellón y horario.
  </p>

  <form class="registro-form" #solForm="ngForm"
    (ngSubmit)="solForm.form.valid && solicitarCirugiaMedico()">
    <div class="form-grid">
      <div class="form-group">
        <label>Paciente</label>
        <select name="solPac" [(ngModel)]="solicitudCirugia.pacienteRut"
          required>
          <option value disabled selected>Seleccione...</option>
          @for (p of pacientes; track p.rut) {
          <option [value]="p.rut">{{ p.nombre }} ({{ p.rut }})</option>
          }
        </select>
      </div>

      <div class="form-group">
        <label>Médico Solicitante</label>
        <input type="text" [value]="medicoNombre" disabled class="input-disabled" />
      </div>

      <div class="form-group">
        <label>Fecha Sugerida</label>
        <input type="date" name="solFecha"
          [(ngModel)]="solicitudCirugia.fechaProgramada">
      </div>
    </div>

    <div class="form-actions">
      <button type="button" class="btn-cancel"
        (click)="volver()">Cancelar</button>
      <button type="submit" class="btn-save" [disabled]="!solForm.valid">Enviar
        Solicitud</button>
    </div>
  </form>
</div>
