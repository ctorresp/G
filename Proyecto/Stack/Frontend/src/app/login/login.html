<div class="modern-login-container">
    <div class="modern-login-card">
        <div class="logo-container">
            <div class="logo-icon">
                <svg viewBox="0 0 24 24" width="28" height="28" stroke="white" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
            </div>
        </div>
        <div class="header-text">
            <h2>Portal {{ portalSeleccionado }}</h2>
            <p>Clínica RedNorte</p>
        </div>

        @if (mensajeError) {
            <div class="error-alert">{{ mensajeError }}</div>
        }

        <form class="modern-form">
            <div class="input-group">
                <input type="text" id="email" name="email" [(ngModel)]="emailOrRut" placeholder=" ">
                <label for="email">Correo electrónico o RUT</label>
            </div>

            <div class="input-group">
                <input type="password" id="password" name="password" [(ngModel)]="password" placeholder=" ">
                <label for="password">Contraseña</label>
            </div>

            <button type="button" class="btn-submit" (click)="iniciarSesion()">
                <span>Ingresar al sistema</span>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
            </button>
        </form>
    </div>
</div>
