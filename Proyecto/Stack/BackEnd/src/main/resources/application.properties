# ══════════════════════════════════════════════
#   auth-service — Configuración de la aplicación
#   Microservicio: Autenticación / DB_Pacientes
#   Spring Boot 3.5.x | Java 21
# ══════════════════════════════════════════════

spring.application.name=auth-service

# ── Puerto del servidor ──────────────────────
server.port=8081

# ── Base de datos MySQL — Laragon ────────────
spring.datasource.url=jdbc:mysql://localhost:3306/db_pacientes?useSSL=false&serverTimezone=America/Santiago&allowPublicKeyRetrieval=true&useUnicode=true&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ──────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# ── JWT ──────────────────────────────────────
# Mínimo 32 caracteres para HS256
app.jwt.secret=RedNorte2024SecretKeyMuySeguraDe256BitsParaJWT
# 86400000 ms = 24 horas
app.jwt.expiration-ms=86400000

# ── Logs ─────────────────────────────────────
logging.level.cl.duoc.rednorte=INFO
logging.level.org.springframework.security=WARN
