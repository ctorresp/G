# ══════════════════════════════════════════════
#   auth-service — Configuración de la aplicación
#   Microservicio: Autenticación / DB_Pacientes
# ══════════════════════════════════════════════

spring.application.name=auth-service

# ── Puerto del servidor ──────────────────────
# Alineado con el Dockerfile y Docker Compose
server.port=8080

# ── Base de datos ────────────────────────────
# Las credenciales y la URL (PostgreSQL) ahora son inyectadas
# directamente por el archivo docker-compose.yml.
# Spring Boot detectará el driver automáticamente.

# ── JPA / Hibernate ──────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=false

# ── JWT ──────────────────────────────────────
app.jwt.secret=RedNorte2024SecretKeyMuySeguraDe256BitsParaJWT
app.jwt.expiration-ms=86400000

# ── Logs ─────────────────────────────────────
logging.level.cl.duoc.rednorte=INFO
logging.level.org.springframework.security=WARN