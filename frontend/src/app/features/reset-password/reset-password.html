<div class="login-container">
  <div class="login-bg"></div>
  <div class="login-card">
    <div class="card-top">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" width="22" height="22" stroke="white"
          stroke-width="3" fill="none" stroke-linecap="round"
          stroke-linejoin="round"><line x1="12" y1="5" x2="12"
            y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
      </div>
      <div class="header-text">
        <h2>Restablecer contraseña</h2>
        <p>RedNorte · Gestión Clínica</p>
      </div>
    </div>

    @if (exito) {
      <div class="success-alert">
        <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor"
          stroke-width="2" fill="none"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
        {{ mensaje }}
      </div>
      <div class="form-actions-center">
        <a class="btn-link" routerLink="/login">Ir al inicio de sesión</a>
      </div>
    } @else {
      @if (error) {
        <div class="error-alert">
          <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor"
            stroke-width="2" fill="none"><circle cx="12" cy="12"
              r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line
              x1="12" y1="16" x2="12.01" y2="16"></line></svg>
          {{ error }}
        </div>
      }

      <p class="description">
        Ingresa tu nueva contraseña.
      </p>

      <form class="login-form">
        <div class="input-group">
          <input type="password" id="newPassword" name="newPassword"
            [(ngModel)]="newPassword" placeholder=" "
            autocomplete="new-password">
          <label for="newPassword">Nueva contraseña</label>
        </div>

        <div class="input-group">
          <input type="password" id="confirmPassword" name="confirmPassword"
            [(ngModel)]="confirmPassword" placeholder=" "
            autocomplete="new-password">
          <label for="confirmPassword">Confirmar contraseña</label>
        </div>

        <button type="button" class="btn-submit" [disabled]="cargando" (click)="restablecer()">
          @if (cargando) {
            <span>Restableciendo...</span>
          } @else {
            <span>Restablecer contraseña</span>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
              stroke-width="2.5" stroke-linecap="round"
              stroke-linejoin="round"><line x1="5" y1="12" x2="19"
                y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
          }
        </button>
      </form>

      <div class="form-actions-center">
        <a class="btn-link" routerLink="/forgot-password">Solicitar nuevo enlace</a>
      </div>
    }
  </div>
</div>
