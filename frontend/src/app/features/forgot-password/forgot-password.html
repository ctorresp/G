<div class="login-container">
  <div class="login-bg"></div>
  <div class="login-card">
    <div class="card-top">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" width="22" height="22" stroke="white"
          stroke-width="3" fill="none" stroke-linecap="round"
          stroke-linejoin="round"><line x1="12" y1="5" x2="12"
            y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
      </div>
      <div class="header-text">
        <h2>Recuperar contraseña</h2>
        <p>RedNorte · Gestión Clínica</p>
      </div>
    </div>

    @if (error) {
      <div class="error-alert">
        <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor"
          stroke-width="2" fill="none"><circle cx="12" cy="12"
            r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line
            x1="12" y1="16" x2="12.01" y2="16"></line></svg>
        {{ error }}
      </div>
    }

    <p class="description">
      Ingresa tu correo electrónico para restablecer tu contraseña.
    </p>

    <form class="login-form">
      <div class="input-group">
        <input type="email" id="email" name="email" [(ngModel)]="email"
          placeholder=" " autocomplete="email">
        <label for="email">Correo electrónico</label>
      </div>

      <button type="button" class="btn-submit" [disabled]="cargando" (click)="enviarLink()">
        @if (cargando) {
          <span>Enviando...</span>
        } @else {
          <span>Enviar enlace</span>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2.5" stroke-linecap="round"
            stroke-linejoin="round"><line x1="5" y1="12" x2="19"
              y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
        }
      </button>
    </form>

    <div class="form-actions-center">
      <a class="btn-link" routerLink="/login">Volver al inicio de sesión</a>
    </div>
  </div>
</div>
