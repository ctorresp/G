# ══════════════════════════════════════════════
#   patient-service — Configuración de la aplicación
# ══════════════════════════════════════════════

spring.application.name=patient-service

# ── Puerto del servidor ──────────────────────
server.port=8082

# ── Base de datos MySQL — Laragon ────────────
spring.datasource.url=jdbc:mysql://localhost:3306/db_pacientes?useSSL=false&serverTimezone=America/Santiago&allowPublicKeyRetrieval=true&useUnicode=true&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ──────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ── Logs ─────────────────────────────────────
logging.level.cl.duoc.rednorte=DEBUG
