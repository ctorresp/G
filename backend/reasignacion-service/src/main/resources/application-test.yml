server:
  port: 8083

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:db_reasignacion}
    username: ${DB_USER:rednorte}
    password: ${DB_PASSWORD:rednorte123}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

app:
  jwt:
    secret: ${JWT_SECRET:RedNorte2024SecretKeyMuySeguraDe256BitsParaJWT}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  cors:
    allowed-origins: http://localhost:4200

pabellon:
  service:
    url: ${PABELLON_SERVICE_URL:http://pabellon-service:8082}
