# ══════════════════════════════════════════════
#   reasignacion-service — Configuración de la aplicación
#   Microservicio: Reasignaciones / Supabase Cloud
#   Spring Boot 3.5.x | Java 21
# ══════════════════════════════════════════════

spring.application.name=reasignacion-service

# ── Puerto del servidor ──────────────────────
server.port=8083

# ── Base de Datos PostgreSQL — Supabase ──────
spring.datasource.url=jdbc:postgresql://db.vbyidivbujshwsqhruon.supabase.co:5432/postgres?sslmode=require
spring.datasource.username=postgres
spring.datasource.password=Proyecto2026
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ──────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# CRÍTICO: Esto obligará a este microservicio a guardar todo dentro del esquema 'reasignacion'
spring.jpa.properties.hibernate.default_schema=reasignacion

# ── JWT ──────────────────────────────────────
app.jwt.secret=${JWT_SECRET:RedNorte2024SecretKeyMuySeguraDe256BitsParaJWT}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# ── CORS ─────────────────────────────────────
app.cors.allowed-origins=http://localhost:4200

# ── Comunicación entre Microservicios ────────
pabellon.service.url=${PABELLON_SERVICE_URL:http://localhost:8082}

# ── Documentación Swagger ────────────────────
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tryItOutEnabled=true